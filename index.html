<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMRC Daily Center</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">AMRC DAILY CENTER</p>
        <h1>每日市場觀點中心</h1>
        <p class="subtitle">一鍵複製 LINE 社群、Threads、IG 文案。</p>
      </div>
      <div class="date-card">
        <span id="today"></span>
      </div>
    </header>

    <section class="notice">
      <strong>使用方式：</strong>每天打開此頁，檢查內容後按「複製」，貼到 LINE 社群或社群平台。
    </section>

    <section id="cards" class="cards"></section>

    <footer>
      <p>AMRC｜市場觀點僅供教育分享，不構成投資建議。請自行控管風險。</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
